<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix AI Studio | Authenticate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #9333ea;
            --primary-purple-hover: #7e22ce;
        }

        /* Custom Cursor Style */
        * { cursor: none !important; }
        #custom-cursor {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 20px solid var(--primary-purple);
            position: fixed; pointer-events: none; z-index: 9999;
            transform: rotate(-30deg);
            filter: drop-shadow(0 0 5px rgba(147, 51, 234, 0.5));
        }
        #custom-cursor::after {
            content: ''; position: absolute; left: -1px; top: 18px;
            width: 2px; height: 8px; background-color: var(--primary-purple);
        }

        body.dark { background-color: #050505; color: #f3f4f6; }
        body.light { background-color: #ffffff; color: #1a1a1a; }

        .auth-card {
            background-color: #0f0f0f;
            border: 1px solid #1f1f1f;
        }
        body.light .auth-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .input-field {
            background: transparent;
            border: 1px solid #2d2d2d;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--primary-purple);
            outline: none;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.2);
        }
        
        .loading-spinner {
            border: 3px solid rgba(147, 51, 234, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--primary-purple);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tab-btn {
            position: relative;
            transition: color 0.3s;
        }
        .tab-btn.active {
            color: var(--primary-purple);
        }
    </style>
</head>
<body class="dark min-h-screen flex items-center justify-center p-4">

    <div id="custom-cursor"></div>

    <div class="auth-card w-full max-w-md p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <div class="text-center mb-6">
            <div onclick="location.href='index.html'" class="inline-flex items-center gap-2 mb-6 hover:opacity-80 transition-opacity">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight">CODENIX <span class="text-purple-600">AI</span></span>
            </div>
            
            <div class="flex justify-center gap-8 mb-4">
                <button id="tab-signin" class="tab-btn active font-bold text-lg" onclick="switchMode('signin')">Sign In</button>
                <button id="tab-signup" class="tab-btn font-bold text-lg text-gray-500" onclick="switchMode('signup')">Sign Up</button>
            </div>
            <p id="auth-subtitle" class="text-gray-400 text-sm">Sign in to your account with a magic link</p>
        </div>

        <div class="space-y-3 mb-6">
            <button id="googleLogin" class="w-full py-3 px-4 border border-gray-700 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-800 transition-colors">
                <i class="fab fa-google text-red-500"></i>
                <span>Continue with Google</span>
            </button>
            <button id="githubLogin" class="w-full py-3 px-4 border border-gray-700 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-800 transition-colors">
                <i class="fab fa-github"></i>
                <span>Continue with GitHub</span>
            </button>
        </div>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-800"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0f0f0f] px-2 text-gray-500" id="divider-text">Or use magic link</span></div>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="signup-fields" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" class="input-field w-full px-4 py-2.5 rounded-xl text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Username</label>
                    <input type="text" id="username" placeholder="johndoe123" class="input-field w-full px-4 py-2.5 rounded-xl text-white">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com" class="input-field w-full px-4 py-2.5 rounded-xl text-white">
            </div>

            <button type="submit" id="submitBtn" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 mt-2">
                <span id="submit-text">Send Magic Link</span>
                <div id="btnLoader" class="hidden loading-spinner"></div>
            </button>
        </form>

        <div id="message" class="mt-6 p-4 rounded-xl hidden text-center text-sm"></div>
    </div>

    <script>
        const supabaseUrl = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const supabaseKey = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const redirectTo = urlParams.get('next') || 'portal.html';

        let currentMode = 'signin';

        // Proactive Auth Check
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = redirectTo;
            }
        }
        checkSession();

        // Listener for state changes (e.g. after clicking email link)
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = redirectTo;
            }
        });

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function switchMode(mode) {
            currentMode = mode;
            const signupFields = document.getElementById('signup-fields');
            const submitText = document.getElementById('submit-text');
            const subtitle = document.getElementById('auth-subtitle');
            const tabSignin = document.getElementById('tab-signin');
            const tabSignup = document.getElementById('tab-signup');

            if (mode === 'signup') {
                signupFields.classList.remove('hidden');
                submitText.innerText = "Create Account";
                subtitle.innerText = "Join Codenix AI Studio today";
                tabSignup.classList.add('active', 'text-purple-600');
                tabSignin.classList.remove('active', 'text-purple-600');
                tabSignin.classList.add('text-gray-500');
            } else {
                signupFields.classList.add('hidden');
                submitText.innerText = "Send Magic Link";
                subtitle.innerText = "Sign in to your account with a magic link";
                tabSignin.classList.add('active', 'text-purple-600');
                tabSignup.classList.remove('active', 'text-purple-600');
                tabSignup.classList.add('text-gray-500');
            }
        }

        const messageBox = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const btnLoader = document.getElementById('btnLoader');

        function showMessage(text, isError = false) {
            messageBox.innerText = text;
            messageBox.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-green-500/10', 'text-green-500');
            messageBox.classList.add(isError ? 'bg-red-500/10' : 'bg-green-500/10', isError ? 'text-red-500' : 'text-green-500');
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            submitBtn.disabled = true;
            btnLoader.classList.remove('hidden');
            
            const options = {
                emailRedirectTo: window.location.origin + '/' + redirectTo,
            };

            if (currentMode === 'signup') {
                options.data = {
                    full_name: document.getElementById('fullname').value,
                    user_name: document.getElementById('username').value
                };
            }

            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: options
            });

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage("Verification link sent! Check your inbox.");
            }
            
            submitBtn.disabled = false;
            btnLoader.classList.add('hidden');
        });

        document.getElementById('googleLogin').addEventListener('click', async () => {
            await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/' + redirectTo }
            });
        });

        document.getElementById('githubLogin').addEventListener('click', async () => {
            await supabaseClient.auth.signInWithOAuth({
                provider: 'github',
                options: { redirectTo: window.location.origin + '/' + redirectTo }
            });
        });

        if (localStorage.getItem('codenix_theme') === 'light') document.body.classList.replace('dark', 'light');
        document.querySelectorAll('button, input, a').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'rotate(-30deg) scale(1.2)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'rotate(-30deg) scale(1)');
        });
    </script>
</body>
</html>
