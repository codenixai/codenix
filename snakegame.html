<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnakeNix - 2 Player & AI Duel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background: #020617;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #game-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px;
        }
        canvas {
            background: #0f172a;
            border: 2px solid #334155;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
        }
        .joystick-base {
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            position: relative;
            touch-action: none;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .joystick-knob {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background 0.2s;
            z-index: 10;
        }
        .joy-label {
            font-size: 8px;
            color: rgba(255,255,255,0.2);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        .controller-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            text-transform: uppercase;
        }
        .active-gp { background: #10b981; color: white; }
    </style>
</head>
<body>

    <!-- Top UI: Scores & Title -->
    <div class="p-3 sm:p-4 flex justify-between items-center bg-slate-900/50 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="text-left">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <h2 class="text-green-500 font-bold text-sm leading-none">P1</h2>
                </div>
                <p id="score1" class="text-xl sm:text-2xl font-black font-mono">0</p>
            </div>
            <div id="gp1-status" class="controller-badge hidden lg:block">GP 1 Off</div>
        </div>

        <div class="text-center">
            <h1 class="text-xl sm:text-2xl font-black italic tracking-tighter leading-none">SNAKE<span class="text-blue-500">NIX</span></h1>
            <p id="mode-display" class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Versus AI</p>
        </div>

        <div class="flex items-center gap-3">
            <div id="gp2-status" class="controller-badge text-right hidden lg:block">GP 2 Off</div>
            <div class="text-right">
                <div class="flex items-center justify-end gap-2">
                    <h2 id="p2-label" class="text-blue-500 font-bold text-sm leading-none">CPU</h2>
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                </div>
                <p id="score2" class="text-xl sm:text-2xl font-black font-mono">0</p>
            </div>
        </div>
    </div>

    <!-- Main Game Canvas -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Overlay -->
        <div id="overlay" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-50 p-6">
            <h2 id="winner-text" class="text-4xl sm:text-6xl font-black mb-8 text-white tracking-widest uppercase text-center">SNAKENIX</h2>
            
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button id="p2-btn" onclick="startGame(false)" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition shadow-lg flex items-center justify-center gap-3 group">
                    <span>2 PLAYER DUEL</span>
                </button>
                <button id="ai-btn" onclick="startGame(true)" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition shadow-lg flex items-center justify-center gap-3">
                    <span>VS COMPUTER (AI)</span>
                </button>
            </div>
            
            <div class="mt-8 text-slate-400 text-xs text-center space-y-1">
                <p>KEYBOARD: WASD / ARROWS / SPACE</p>
                <p>GAMEPAD: STICK OR BUTTONS TO START</p>
                <p class="text-blue-400 font-bold">PRESS ANY ACTION BUTTON TO PLAY</p>
            </div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="px-4 py-6 flex justify-between items-center bg-slate-950 border-t border-slate-900">
        <!-- P1 Controls -->
        <div class="flex items-center gap-4">
            <div id="joy1" class="joystick-base">
                <div class="joy-label" id="p1-joy-label">Start</div>
                <div id="knob1" class="joystick-knob" style="border: 2px solid #22c55e;"></div>
            </div>
            <div id="boost1" class="action-btn text-green-500 border-green-500/30">BOOST</div>
        </div>

        <!-- System -->
        <div class="hidden sm:flex flex-col items-center opacity-40">
            <div class="text-[10px] font-bold tracking-tighter">CROSS-PLATFORM</div>
            <div class="flex gap-1 mt-1">
                <div class="w-2 h-2 rounded-full bg-white/20"></div>
                <div class="w-2 h-2 rounded-full bg-white/20"></div>
            </div>
        </div>

        <!-- P2 Controls -->
        <div id="p2-controls" class="flex items-center gap-4">
            <div id="boost2" class="action-btn text-blue-500 border-blue-500/30">BOOST</div>
            <div id="joy2" class="joystick-base">
                <div class="joy-label" id="p2-joy-label">Start</div>
                <div id="knob2" class="joystick-knob" style="border: 2px solid #3b82f6;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const overlay = document.getElementById('overlay');
        const winnerText = document.getElementById('winner-text');
        const gp1Status = document.getElementById('gp1-status');
        const gp2Status = document.getElementById('gp2-status');
        const p2Label = document.getElementById('p2-label');
        const modeDisplay = document.getElementById('mode-display');
        const p2Controls = document.getElementById('p2-controls');

        // Config
        const GRID_SIZE = 20;
        let tileCountX, tileCountY;
        let gameRunning = false;
        let vsAI = true;
        let lastTimestamp = 0;
        let baseFPS = 10;
        let p1Boost = false;
        let p2Boost = false;

        const p1 = { body: [], dir: {x: 1, y: 0}, nextDir: {x: 1, y: 0}, score: 0, color: '#22c55e', headColor: '#4ade80', id: 1 };
        const p2 = { body: [], dir: {x: -1, y: 0}, nextDir: {x: -1, y: 0}, score: 0, color: '#3b82f6', headColor: '#60a5fa', id: 2 };
        let food = {x: 0, y: 0};

        function resize() {
            const container = document.getElementById('game-container');
            const width = container.clientWidth - 20;
            const height = container.clientHeight - 20;
            canvas.width = Math.floor(width / GRID_SIZE) * GRID_SIZE;
            canvas.height = Math.floor(height / GRID_SIZE) * GRID_SIZE;
            tileCountX = canvas.width / GRID_SIZE;
            tileCountY = canvas.height / GRID_SIZE;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Gamepad Logic ---
        function updateGamepadUI() {
            const gps = navigator.getGamepads();
            if (gps[0]) { gp1Status.innerText = "GP 1 READY"; gp1Status.classList.add('active-gp'); }
            else { gp1Status.innerText = "GP 1 OFF"; gp1Status.classList.remove('active-gp'); }
            if (gps[1]) { gp2Status.innerText = "GP 2 READY"; gp2Status.classList.add('active-gp'); }
            else { gp2Status.innerText = "GP 2 OFF"; gp2Status.classList.remove('active-gp'); }
        }
        window.addEventListener("gamepadconnected", updateGamepadUI);
        window.addEventListener("gamepaddisconnected", updateGamepadUI);

        function pollGamepads() {
            const gps = navigator.getGamepads();
            for (let i = 0; i < 2; i++) {
                const gp = gps[i];
                if (!gp) continue;
                const p = (i === 0) ? p1 : p2;
                
                // Direction
                const axX = gp.axes[0], axY = gp.axes[1], dz = 0.4;
                if (axY < -dz) setDir(p, 0, -1);
                else if (axY > dz) setDir(p, 0, 1);
                else if (axX < -dz) setDir(p, -1, 0);
                else if (axX > dz) setDir(p, 1, 0);

                if (gp.buttons[12]?.pressed) setDir(p, 0, -1);
                if (gp.buttons[13]?.pressed) setDir(p, 0, 1);
                if (gp.buttons[14]?.pressed) setDir(p, -1, 0);
                if (gp.buttons[15]?.pressed) setDir(p, 1, 0);

                // Actions (A, B, X, Y)
                const anyActionPressed = gp.buttons[0]?.pressed || gp.buttons[1]?.pressed || gp.buttons[2]?.pressed || gp.buttons[3]?.pressed;
                
                // Restart / Start Logic
                if (!gameRunning) {
                    if (anyActionPressed || gp.buttons[9]?.pressed) {
                        startGame(vsAI);
                        return;
                    }
                }

                // Boosting
                if (i === 0) p1Boost = anyActionPressed;
                else if (i === 1) p2Boost = anyActionPressed;
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') { p1Boost = true; if(!gameRunning) startGame(vsAI); }
            if (e.code === 'KeyW') setDir(p1, 0, -1);
            if (e.code === 'KeyS') setDir(p1, 0, 1);
            if (e.code === 'KeyA') setDir(p1, -1, 0);
            if (e.code === 'KeyD') setDir(p1, 1, 0);
            if (e.code === 'ArrowUp') setDir(p2, 0, -1);
            if (e.code === 'ArrowDown') setDir(p2, 0, 1);
            if (e.code === 'ArrowLeft') setDir(p2, -1, 0);
            if (e.code === 'ArrowRight') setDir(p2, 1, 0);
            
            // Allow any key to start if on menu
            if (!gameRunning && (e.code.includes('Arrow') || e.code.includes('Key'))) {
                startGame(vsAI);
            }
        });
        window.addEventListener('keyup', e => { if(e.code === 'Space') p1Boost = false; });

        function setDir(p, x, y) {
            if (p.dir.x !== -x || p.dir.y !== -y) p.nextDir = {x, y};
        }

        // --- AI Logic ---
        function updateAI() {
            if (!vsAI) return;
            const head = p2.body[0];
            const diffX = food.x - head.x;
            const diffY = food.y - head.y;

            let choices = [
                {x: 0, y: -1, score: 0}, {x: 0, y: 1, score: 0},
                {x: -1, y: 0, score: 0}, {x: 1, y: 0, score: 0}
            ];

            choices.forEach(c => {
                if (c.x === -p2.dir.x && c.y === -p2.dir.y) { c.score = -1000; return; }
                const next = { x: (head.x + c.x + tileCountX) % tileCountX, y: (head.y + c.y + tileCountY) % tileCountY };
                const col = [...p1.body, ...p2.body].some(s => s.x === next.x && s.y === next.y);
                if (col) c.score -= 500;
                if (c.x !== 0 && Math.sign(c.x) === Math.sign(diffX)) c.score += 10;
                if (c.y !== 0 && Math.sign(c.y) === Math.sign(diffY)) c.score += 10;
            });

            choices.sort((a, b) => b.score - a.score);
            setDir(p2, choices[0].x, choices[0].y);
            p2Boost = (Math.abs(diffX) > 5 && diffY === 0) || (Math.abs(diffY) > 5 && diffX === 0);
        }

        // --- Joysticks & Boosts ---
        function setupUI() {
            const bindBoost = (id, setter) => {
                const btn = document.getElementById(id);
                const start = () => {
                    if(!gameRunning) startGame(vsAI);
                    setter(true);
                };
                const end = () => setter(false);
                btn.onmousedown = btn.ontouchstart = start;
                btn.onmouseup = btn.ontouchend = end;
            };
            bindBoost('boost1', (v) => p1Boost = v);
            bindBoost('boost2', (v) => p2Boost = v);

            const setupJoy = (id, knobId, p, labelId) => {
                const base = document.getElementById(id);
                const knob = document.getElementById(knobId);
                const label = document.getElementById(labelId);
                let active = false;
                
                const move = (cx, cy) => {
                    if (!active) return;
                    const r = base.getBoundingClientRect();
                    const dx = cx - (r.left + r.width/2), dy = cy - (r.top + r.height/2);
                    const d = Math.sqrt(dx*dx + dy*dy);
                    const l = 30;
                    knob.style.transform = `translate(calc(-50% + ${(dx/d)*Math.min(d,l)}px), calc(-50% + ${(dy/d)*Math.min(d,l)}px))`;
                    if (d > 10) {
                        if (Math.abs(dx) > Math.abs(dy)) setDir(p, dx>0?1:-1, 0);
                        else setDir(p, 0, dy>0?1:-1);
                    }
                };

                base.onmousedown = base.ontouchstart = (e) => { 
                    if(!gameRunning) {
                        startGame(vsAI);
                    }
                    active = true; 
                    const t = e.touches?.[0]||e; 
                    move(t.clientX, t.clientY); 
                };
                window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
                window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
                window.onmouseup = window.ontouchend = () => { 
                    active = false; 
                    knob.style.transform = `translate(-50%, -50%)`; 
                };
            };
            setupJoy('joy1', 'knob1', p1, 'p1-joy-label');
            setupJoy('joy2', 'knob2', p2, 'p2-joy-label');
        }
        setupUI();

        // --- Core Loop ---
        function gameTick(timestamp) {
            pollGamepads();
            if (!gameRunning) {
                requestAnimationFrame(gameTick);
                return;
            }
            
            let currentFPS = baseFPS;
            if (p1Boost || p2Boost) currentFPS = baseFPS * 1.8;

            if (timestamp - lastTimestamp > 1000 / currentFPS) {
                lastTimestamp = timestamp;
                updateAI();
                movePlayer(p1);
                movePlayer(p2);
                checkCollision();
                draw();
            }
            requestAnimationFrame(gameTick);
        }

        function movePlayer(p) {
            p.dir = p.nextDir;
            const head = { 
                x: (p.body[0].x + p.dir.x + tileCountX) % tileCountX, 
                y: (p.body[0].y + p.dir.y + tileCountY) % tileCountY 
            };
            p.body.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                p.score += 10;
                if (p.id === 1) score1El.innerText = p.score; else score2El.innerText = p.score;
                spawnFood();
            } else {
                p.body.pop();
            }
        }

        function spawnFood() {
            food = { x: Math.floor(Math.random()*tileCountX), y: Math.floor(Math.random()*tileCountY) };
            if ([...p1.body, ...p2.body].some(s => s.x === food.x && s.y === food.y)) spawnFood();
        }

        function checkCollision() {
            const h1 = p1.body[0], h2 = p2.body[0];
            const p1Hit = p1.body.slice(1).some(s=>s.x===h1.x&&s.y===h1.y) || p2.body.some(s=>s.x===h1.x&&s.y===h1.y);
            const p2Hit = p2.body.slice(1).some(s=>s.x===h2.x&&s.y===h2.y) || p1.body.some(s=>s.x===h2.x&&s.y===h2.y);
            if (p1Hit && p2Hit) endGame("DRAW");
            else if (p1Hit) endGame(vsAI ? "CPU WINS" : "P2 WINS");
            else if (p2Hit) endGame("P1 WINS");
        }

        function draw() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f43f5e'; ctx.shadowBlur = 15; ctx.shadowColor = '#f43f5e';
            ctx.beginPath(); ctx.arc(food.x*GRID_SIZE+GRID_SIZE/2, food.y*GRID_SIZE+GRID_SIZE/2, GRID_SIZE/2.5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            const drawS = (p) => p.body.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? p.headColor : p.color;
                ctx.beginPath(); ctx.roundRect(s.x*GRID_SIZE+1, s.y*GRID_SIZE+1, GRID_SIZE-2, GRID_SIZE-2, 4); ctx.fill();
            });
            drawS(p1); drawS(p2);
        }

        function startGame(aiMode) {
            vsAI = aiMode;
            p2Label.innerText = vsAI ? "CPU" : "P2";
            modeDisplay.innerText = vsAI ? "Versus AI" : "2 Player Duel";
            p2Controls.style.opacity = vsAI ? "0.2" : "1";
            p2Controls.style.pointerEvents = vsAI ? "none" : "auto";
            
            // Hide labels on joystick
            document.getElementById('p1-joy-label').style.opacity = "0";
            document.getElementById('p2-joy-label').style.opacity = "0";

            p1.body = [{x: 5, y: Math.floor(tileCountY/2)}]; p1.dir = {x:1,y:0}; p1.nextDir = {x:1,y:0}; p1.score = 0;
            p2.body = [{x: tileCountX-6, y: Math.floor(tileCountY/2)}]; p2.dir = {x:-1,y:0}; p2.nextDir = {x:-1,y:0}; p2.score = 0;
            score1El.innerText = score2El.innerText = "0";
            overlay.classList.add('hidden');
            spawnFood();
            gameRunning = true;
            lastTimestamp = performance.now();
        }

        function endGame(msg) {
            gameRunning = false;
            winnerText.innerText = msg;
            overlay.classList.remove('hidden');
            document.getElementById('p1-joy-label').style.opacity = "1";
            document.getElementById('p2-joy-label').style.opacity = "1";
        }

        draw(); updateGamepadUI();
        requestAnimationFrame(gameTick);
    </script>
</body>
</html>
