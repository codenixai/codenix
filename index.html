<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
            background-color: #ffffff;
            scroll-behavior: smooth;
        }
        .app-card:hover {
            background-color: #f8f9fa;
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }
        .nav-link.active {
            color: #01875f;
            border-bottom: 3px solid #01875f;
        }
        .squircle {
            border-radius: 22%;
        }
        .simulator-wrapper {
            position: relative;
            background: #111;
            border-radius: 32px;
            padding: 10px;
            border: 6px solid #222;
            aspect-ratio: 9/18.5;
            width: 100%;
            max-width: 280px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .simulator-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="showMainGrid()">
                    <svg width="32" height="32" viewBox="0 0 48 48">
                        <path fill="#4DB6AC" d="M6 38.056V9.944c0-1.605 1.745-2.601 3.125-1.785l23.75 14.056c1.35.8 1.35 2.77 0 3.57l-23.75 14.056c-1.38.816-3.125-.18-3.125-1.785z"/>
                        <path fill="#009688" d="M32.875 24L6 38.056V9.944L32.875 24z"/>
                    </svg>
                    <span class="text-2xl font-medium text-gray-600 tracking-tight">APPnix</span>
                </div>
            </div>

            <div class="flex-1 max-w-2xl mx-8 hidden sm:block" id="searchContainer">
                <div class="relative bg-gray-100 rounded-xl flex items-center px-4 py-2 border border-transparent focus-within:bg-white focus-within:border-gray-200 transition-all">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Search apps & games" class="bg-transparent border-none focus:ring-0 w-full ml-3 outline-none text-sm">
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <div class="w-9 h-9 bg-green-700 rounded-full flex items-center justify-center text-white font-bold text-sm cursor-pointer shadow-sm">A</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div id="gridView">
            <section class="mb-12">
                <h1 class="text-2xl font-medium mb-6">Top Charts & New Releases</h1>
                <div id="loading" class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-green-600 mb-4"></div>
                    <p class="text-gray-500 text-sm">Syncing latest apps...</p>
                </div>
                <div id="appGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-x-4 gap-y-8 opacity-0 transition-opacity duration-500"></div>
            </section>
        </div>

        <div id="detailView" class="hidden">
            <button onclick="showMainGrid()" class="flex items-center text-gray-600 hover:text-black mb-8 group transition-colors">
                <svg class="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </button>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                <div class="lg:col-span-8">
                    <div class="flex items-start space-x-6 mb-8">
                        <img id="detailLogo" src="" class="w-24 h-24 sm:w-32 sm:h-32 squircle shadow-md border border-gray-100" alt="App Logo">
                        <div class="flex-1">
                            <h2 id="detailName" class="text-3xl sm:text-4xl font-bold text-gray-900 leading-tight">App Name</h2>
                            <p class="text-green-700 font-medium text-lg mt-1">Verified Distribution</p>
                            <div class="flex items-center mt-4 space-x-6 text-sm text-gray-600">
                                <div class="text-center"><span class="block font-bold text-black text-base">4.8 ★</span> 12K reviews</div>
                                <div class="border-l border-gray-300 h-8"></div>
                                <div class="text-center"><span class="block font-bold text-black text-base">500K+</span> Downloads</div>
                                <div class="border-l border-gray-300 h-8"></div>
                                <div class="text-center"><span class="block font-bold text-black text-base">E</span> Everyone</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-3 mb-10">
                        <button id="downloadBtn" class="flex-1 sm:flex-none min-w-[200px] px-8 py-3 bg-[#01875f] text-white rounded-lg font-medium text-center hover:bg-[#016d4d] transition-all shadow-md active:scale-95">
                            Download APK
                        </button>
                        <button class="px-6 py-3 border border-gray-300 rounded-lg font-medium hover:bg-gray-50 transition-colors">Install on more devices</button>
                    </div>

                    <div class="border-t border-gray-200 pt-8">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-medium">About this app</h3>
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                        <p class="text-gray-600 leading-relaxed mb-6">
                            Verified package distribution. Secure installation tested on multiple architectures.
                        </p>
                    </div>
                </div>

                <div class="lg:col-span-4 flex flex-col items-center">
                    <div class="simulator-wrapper shadow-2xl">
                        <div id="simLoading" class="simulator-loading">
                            <div class="w-12 h-12 border-4 border-gray-700 border-t-green-500 rounded-full animate-spin mb-4"></div>
                            <p class="text-white text-[10px] uppercase tracking-widest font-bold">Booting App...</p>
                        </div>
                        <iframe id="simulatorFrame" src="" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1iZVeUcr0Fb9hyd94iOqDMbTKBb0S94h0fyCNlSi26aI';
        let allApps = [];

        function handleData(response) {
            if (response.status === 'error') return;
            const data = response.table.rows;
            allApps = data.map(row => ({
                name: row.c[0] ? row.c[0].v : 'Untitled App',
                logo: row.c[1] ? row.c[1].v : '',
                directory: row.c[2] ? row.c[2].v : ''
            })).filter(app => app.name && app.name !== "Untitled App");
            renderApps(allApps);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('appGrid').classList.remove('opacity-0');
        }

        function initFetch() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&t=${Date.now()}`;
            const script = document.createElement('script');
            script.src = url;
            document.body.appendChild(script);
        }

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card p-2 rounded-2xl cursor-pointer group';
                card.onclick = () => openAppDetail(app);
                card.innerHTML = `
                    <div class="aspect-square w-full mb-3 overflow-hidden squircle bg-white border border-gray-100 shadow-sm flex items-center justify-center">
                        <img src="${app.logo}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=random&color=fff'">
                    </div>
                    <h3 class="text-sm font-medium text-gray-900 truncate px-1">${app.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function openAppDetail(app) {
            document.getElementById('gridView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('detailName').innerText = app.name;
            document.getElementById('detailLogo').src = app.logo;
            
            const simFrame = document.getElementById('simulatorFrame');
            const simLoading = document.getElementById('simLoading');
            simLoading.style.opacity = '1';
            simLoading.classList.remove('hidden');
            simFrame.src = "https://appetize.io/embed/8bn7wv_mzy69?device=pixel4&osVersion=11.0&scale=75&autoplay=true";
            simFrame.onload = () => {
                setTimeout(() => {
                    simLoading.style.opacity = '0';
                    setTimeout(() => simLoading.classList.add('hidden'), 500);
                }, 1500);
            };
            
            // DOWNLOAD FIX
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.onclick = () => {
                const a = document.createElement('a');
                let finalPath = app.directory;
                
                // If it's a relative path like "app/file.apk", make it absolute to current window location
                if (!finalPath.startsWith('http') && !finalPath.startsWith('file://')) {
                   const currentBase = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
                   finalPath = currentBase + finalPath;
                }
                
                a.href = finalPath;
                const fileName = finalPath.split('/').pop() || (app.name.toLowerCase().replace(/\s+/g, '-') + '.apk');
                a.download = fileName;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            window.scrollTo(0,0);
        }

        function showMainGrid() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('gridView').classList.remove('hidden');
            document.getElementById('simulatorFrame').src = "";
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderApps(allApps.filter(app => app.name.toLowerCase().includes(term)));
        });

        window.onload = initFetch;
    </script>
</body>
</html>
