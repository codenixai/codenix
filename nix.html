<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix | Professional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --nix-accent: #3b82f6;
            --nix-bg: #050507;
            --nix-surface: #0e0e11;
            --nix-border: rgba(255, 255, 255, 0.08);
            --melon-primary: #bef264;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--nix-bg);
            color: #fafafa;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        .glass-panel {
            background: rgba(14, 14, 17, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--nix-border);
        }

        .nix-gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-nix {
            background: #fafafa;
            color: #000;
            transition: all 0.2s ease;
        }
        .btn-nix:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .code-container {
            background: #000;
            border: 1px solid var(--nix-border);
            border-radius: 12px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .code-header {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--nix-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        pre {
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #d1d5db;
            overflow-x: auto;
        }

        .msg-bubble {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #mobileOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 60;
        }

        @media (max-width: 1024px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100%;
                z-index: 70;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #sidebar.open { left: 0; }
            #mobileOverlay.show { display: block; }
        }

        .active-visual {
            color: var(--melon-primary) !important;
            border-color: rgba(190, 242, 100, 0.3) !important;
            background: rgba(190, 242, 100, 0.05) !important;
        }

        .ratio-btn.active {
            border-color: var(--melon-primary);
            color: var(--melon-primary);
        }
        
        .input-container-sticky {
            z-index: 40;
            pointer-events: none;
        }
        .input-container-sticky > * {
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-[#050507]">

    <div id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- Feature Modal -->
    <div id="featureModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="glass-panel max-w-md w-full p-8 rounded-[32px] border-blue-500/30 text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6">
                <i class="fa-solid fa-sparkles text-2xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-white mb-2">Neural Workspace v4.5</h3>
            <p class="text-zinc-400 text-sm mb-8">Nix now features persistent memory and conversation cloud sync via Vercel Integration.</p>
            <button onclick="closeFeatureModal()" class="btn-nix w-full py-4 rounded-2xl font-black uppercase tracking-widest text-xs">Acknowledge</button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] lg:w-80 glass-panel border-r flex flex-col p-6 h-full shadow-2xl shrink-0">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                    <span class="font-black text-xl">N</span>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter">Nix <span class="nix-gradient-text">Core</span></h1>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto pr-2">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">
                <i class="fa-solid fa-plus"></i> New Session
            </button>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-400/70 block">History</span>
                <div id="chatHistoryList" class="space-y-2"></div>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-lime-400/70 block">Visual Ratio</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setRatio('1024x1024')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold active" id="btn-1-1">1:1</button>
                    <button onclick="setRatio('1280x720')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold" id="btn-16-9">16:9</button>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div id="userProfile" class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] font-bold">U</div>
                <div class="flex-1 overflow-hidden">
                    <p id="userEmail" class="text-[10px] font-bold text-white truncate">User</p>
                    <button onclick="signOut()" class="text-[9px] text-zinc-500 hover:text-red-400 uppercase tracking-widest font-black transition">Sign Out</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-full w-full overflow-hidden">
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 border-b border-white/5 bg-[#050507]/80 backdrop-blur-md shrink-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-lg border border-white/10 text-zinc-400 hover:bg-white/5">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500">System Ready</span>
                </div>
            </div>
            <div id="memoryStatus" class="hidden md:flex items-center gap-2 px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Neural Link Active</span>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto p-4 lg:p-12 space-y-8 scroll-smooth pb-44 lg:pb-52">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center space-y-6 py-20">
                <div class="w-20 h-20 bg-blue-600/10 rounded-[32px] flex items-center justify-center border border-blue-500/20">
                    <i class="fa-solid fa-brain text-4xl text-blue-500"></i>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-white tracking-tight">Intelligence Initialized.</h2>
                    <p class="text-zinc-500 text-xs uppercase tracking-widest font-bold">Awaiting Input Vectors (Proxy Active)</p>
                </div>
            </div>
        </div>

        <div class="input-container-sticky fixed lg:absolute bottom-0 left-0 right-0 p-4 lg:p-8 bg-gradient-to-t from-[#050507] via-[#050507]/90 to-transparent">
            <div class="max-w-4xl mx-auto">
                <div id="filePreview" class="hidden p-3 mb-2 glass-panel rounded-xl flex items-center justify-between border-blue-500/20">
                    <span id="fileName" class="text-[10px] font-bold text-blue-400 truncate uppercase tracking-widest"></span>
                    <button onclick="clearFile()" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <div class="glass-panel p-2 rounded-[28px] lg:rounded-[32px] border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col">
                    <textarea id="promptInput" rows="1" 
                        class="w-full bg-transparent border-none outline-none text-[15px] p-3 text-white placeholder-zinc-700 resize-none max-h-[160px] overflow-y-auto"
                        placeholder="Type a command or drop a file..."
                        onkeydown="handleKeyDown(event)"
                        oninput="adjustInputHeight(this)"></textarea>
                    
                    <div class="flex items-center justify-between p-2 border-t border-white/5 mt-1">
                        <div class="flex gap-1 lg:gap-2">
                            <label class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 cursor-pointer transition">
                                <input type="file" class="hidden" id="fileInput" onchange="handleFile(event)">
                                <i class="fa-solid fa-paperclip"></i>
                            </label>
                            <button onclick="toggleVisual()" id="visualBtn" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 transition">
                                <i class="fa-solid fa-image"></i>
                            </button>
                        </div>
                        <button id="sendBtn" onclick="handleInput()" class="btn-nix px-6 lg:px-10 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-xl shadow-white/5 active:scale-95 transition-transform">
                            <span>Execute</span>
                            <i class="fa-solid fa-bolt-lightning text-[10px]"></i>
                        </button>
                    </div>
                </div>
                <div class="h-2 lg:hidden"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Vercel backend endpoint
        const VERCEL_API_ENDPOINT = "/api/chat"; 
        
        let activeRatio = "1024x1024";
        let visualMode = false;
        let currentConvId = null;
        let userMemories = "";
        let attachedFileContent = "";
        let currentUser = null;

        async function checkAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = "auth.html";
                } else {
                    currentUser = session.user;
                    document.getElementById('userEmail').innerText = currentUser.email;
                    initializeSession();
                }
            } catch (err) { console.error(err); }
        }

        async function initializeSession() {
            loadMemories();
            loadConversations();
            if (!localStorage.getItem('nix_v4_seen')) {
                document.getElementById('featureModal').classList.remove('hidden');
                document.getElementById('featureModal').classList.add('flex');
            }
        }

        function closeFeatureModal() {
            localStorage.setItem('nix_v4_seen', 'true');
            document.getElementById('featureModal').classList.add('hidden');
        }

        async function loadMemories() {
            const { data } = await supabaseClient.from('user_memories').select('content').eq('user_id', currentUser.id);
            if (data?.length) {
                userMemories = data.map(m => m.content).join("\n");
                document.getElementById('memoryStatus').classList.remove('hidden');
            }
        }

        async function loadConversations() {
            const { data } = await supabaseClient.from('conversations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const list = document.getElementById('chatHistoryList');
            list.innerHTML = (data || []).map(conv => `
                <button onclick="loadChat('${conv.id}')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 transition group flex items-center gap-3">
                    <i class="fa-regular fa-message text-zinc-600 group-hover:text-blue-400 transition"></i>
                    <span class="text-[11px] text-zinc-400 truncate flex-1">${conv.title || 'Untitled Session'}</span>
                </button>
            `).join('');
        }

        async function createNewChat(title = "New Session") {
            const { data } = await supabaseClient.from('conversations').insert([{ user_id: currentUser.id, title: title.substring(0, 30) }]).select().single();
            currentConvId = data.id;
            document.getElementById('chatWindow').innerHTML = "";
            loadConversations();
            return data.id;
        }

        async function loadChat(id) {
            currentConvId = id;
            const win = document.getElementById('chatWindow');
            win.innerHTML = "";
            document.getElementById('emptyState')?.remove();
            
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('mobileOverlay').classList.remove('show');

            const { data } = await supabaseClient.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
            (data || []).forEach(msg => appendMsg(msg.role, msg.content, null, false));
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleInput(); 
            }
        }

        function adjustInputHeight(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                attachedFileContent = ev.target.result;
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('filePreview').classList.remove('hidden');
            };
            reader.readAsText(file);
        }

        function clearFile() {
            attachedFileContent = "";
            document.getElementById('filePreview').classList.add('hidden');
            document.getElementById('fileInput').value = "";
        }

        function toggleVisual() {
            visualMode = !visualMode;
            document.getElementById('visualBtn').classList.toggle('active-visual', visualMode);
        }

        async function handleInput() {
            const input = document.getElementById('promptInput');
            const text = input.value.trim();
            if (!text && !attachedFileContent) return;

            if (!currentConvId) await createNewChat(text || "File Analysis");
            document.getElementById('emptyState')?.remove();
            
            let fullText = text;
            if (attachedFileContent) fullText = `[File Content Included]\n\nQuery: ${text}\n\nContext:\n${attachedFileContent}`;

            appendMsg('user', text || "[Attached File]");
            await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'user', content: text || "[File]" }]);
            
            input.value = '';
            input.style.height = 'auto';
            clearFile();

            if (visualMode || ['draw', 'generate', 'image'].some(t => text.toLowerCase().includes(t))) {
                await generateImage(text);
                visualMode = false;
                document.getElementById('visualBtn').classList.remove('active-visual');
            } else {
                await computeResponse(fullText);
            }
        }

        async function generateImage(prompt) {
            const id = 'img-' + Date.now();
            appendMsg('assistant', `Constructing visual representation for: **"${prompt}"**`, id);
            const [w, h] = activeRatio.split('x');
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${Math.floor(Math.random()*100000)}&model=flux&nologo=true`;
            
            const container = document.getElementById(id);
            const imgDiv = document.createElement('div');
            imgDiv.className = "mt-4 rounded-2xl overflow-hidden border border-white/10 bg-white/5 animate-pulse min-h-[300px] flex items-center justify-center";
            imgDiv.innerHTML = `<img src="${url}" class="w-full h-auto opacity-0 transition-opacity duration-500" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('animate-pulse')">`;
            container.appendChild(imgDiv);
            
            await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'assistant', content: `[Generated Image: ${prompt}]` }]);
        }

        async function computeResponse(text) {
            const id = 'msg-' + Date.now();
            appendMsg('assistant', `<div class="flex items-center gap-2"><span class="w-1 h-1 bg-blue-500 rounded-full animate-bounce"></span><span class="w-1 h-1 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span><span class="w-1 h-1 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span></div>`, id);
            
            try {
                const res = await fetch(VERCEL_API_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // UPDATED: Using correct model identifier from documentation
                        model: "LongCat-Flash-Chat", 
                        messages: [
                            { role: "system", content: `You are Nix, an advanced professional intelligence. Be concise, expert-level, and helpful. Current Memories: ${userMemories}` },
                            { role: "user", content: text }
                        ]
                    })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error?.message || errData.error || "Execution Error");
                }

                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                document.getElementById(id).innerHTML = formatMarkdown(reply);
                await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'assistant', content: reply }]);
            } catch (e) { 
                console.error("API Error:", e);
                document.getElementById(id).innerHTML = `<div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs font-bold uppercase tracking-widest"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Interface Error: ${e.message}</div>`; 
            }
        }

        function appendMsg(role, content, id = null, save = true) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-bubble flex gap-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[88%] lg:max-w-[75%] ${role === 'user' ? 'bg-white/5 px-5 py-4 rounded-[24px] rounded-tr-none border border-white/10 shadow-xl' : ''}">
                    ${role === 'assistant' ? `<div class="flex items-center gap-2 mb-2"><div class="w-4 h-4 bg-blue-600 rounded flex items-center justify-center text-[8px] font-black">N</div><div class="text-[9px] font-black text-blue-500 uppercase tracking-widest">System Response</div></div>` : ''}
                    <div id="${id || ''}" class="text-[14px] lg:text-[15px] leading-relaxed text-zinc-300 font-medium">${role === 'user' ? content : formatMarkdown(content)}</div>
                </div>
            `;
            win.appendChild(div);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function formatMarkdown(text) {
            text = text.replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => `
                <div class="code-container">
                    <div class="code-header"><span class="text-[9px] uppercase font-bold text-zinc-500">${lang || 'Terminal'}</span><i class="fa-regular fa-copy text-[10px] cursor-pointer hover:text-white"></i></div>
                    <pre><code>${code.trim()}</code></pre>
                </div>
            `);
            return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
                       .replace(/\n/g, '<br>');
        }

        async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }
        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sb.classList.toggle('open'); 
            overlay.classList.toggle('show'); 
        }
        function setRatio(r) { 
            activeRatio = r; 
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b.id === (r === '1024x1024' ? 'btn-1-1' : 'btn-16-9'))); 
        }
        
        window.onload = checkAuth;
    </script>
</body>
</html>
