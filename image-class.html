<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        .progress-bar {
            transition: width 0.3s ease;
        }
        #display-container canvas, #display-container img {
            border-radius: 1rem;
            width: 100% !important;
            height: auto !important;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">Image Classifier</h1>
            <p class="text-slate-500">Instant AI Analysis</p>
        </header>

        <main class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <!-- Mode Selection Section -->
            <div id="setup-section" class="mb-8 border-b border-slate-100 pb-8 text-center">
                <p class="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wider">Choose Input Source</p>
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="init('webcam')" id="webcam-btn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-md flex flex-col items-center justify-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        <span>Live Camera</span>
                    </button>
                    <button type="button" onclick="init('upload')" id="upload-btn"
                        class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-md flex flex-col items-center justify-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        <span>Upload File</span>
                    </button>
                </div>
            </div>

            <!-- File Upload Input (Hidden by default) -->
            <div id="upload-input-container" class="hidden mb-8 text-center p-8 border-2 border-dashed border-indigo-200 rounded-2xl bg-indigo-50 hover:bg-indigo-100 transition-colors">
                <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                <label for="image-upload" class="cursor-pointer block">
                    <svg class="w-10 h-10 text-indigo-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                    <div class="text-indigo-600 font-bold mb-1">Click to select an image</div>
                    <div class="text-xs text-slate-500 italic text-balance">The AI will analyze the picture immediately after selection.</div>
                </label>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden text-center py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
                <p class="text-slate-600 font-medium">Neural Network Loading...</p>
            </div>

            <!-- Active Classification View -->
            <div id="active-view" class="hidden">
                <div class="flex justify-center mb-8">
                    <div id="display-container" class="relative overflow-hidden rounded-2xl bg-slate-100 ring-4 ring-slate-50">
                        <!-- Canvas for Webcam or Img for Uploads goes here -->
                    </div>
                </div>

                <div id="label-container" class="space-y-4 px-2">
                    <!-- Predictions injected here -->
                </div>
                
                <button onclick="location.reload()" class="mt-10 w-full py-3 rounded-lg border-2 border-slate-200 text-slate-500 font-semibold hover:border-indigo-600 hover:text-indigo-600 transition-all">
                    ← Switch Input Source
                </button>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-12">
                <p class="text-slate-400 text-sm italic">Ready to analyze your images.</p>
            </div>
        </main>

        <footer class="mt-8 text-center text-slate-400 text-xs">
            <p>Model ID: XPthWQ1Yl</p>
        </footer>
    </div>

    <script type="text/javascript">
        // Hardcoded Model URL
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/XPthWQ1Yl/";
        
        let model, webcam, labelContainer, maxPredictions;
        let isWebcamMode = false;

        async function init(mode) {
            const loadingDiv = document.getElementById("loading");
            const emptyState = document.getElementById("empty-state");
            const activeView = document.getElementById("active-view");
            const uploadSection = document.getElementById("upload-input-container");
            const setupSection = document.getElementById("setup-section");

            try {
                loadingDiv.classList.remove('hidden');
                emptyState.classList.add('hidden');
                setupSection.classList.add('opacity-40', 'pointer-events-none');

                // Load Model
                const modelURL = MODEL_URL + "model.json";
                const metadataURL = MODEL_URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Prepare UI
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = '';
                for (let i = 0; i < maxPredictions; i++) {
                    const classRow = document.createElement("div");
                    classRow.className = "flex flex-col gap-1";
                    classRow.innerHTML = `
                        <div class="flex justify-between text-xs font-bold uppercase tracking-tighter">
                            <span class="class-name text-slate-500">---</span>
                            <span class="class-prob text-indigo-600 font-mono">0.00</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3">
                            <div class="progress-bar bg-indigo-500 h-3 rounded-full" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(classRow);
                }

                if (mode === 'webcam') {
                    isWebcamMode = true;
                    webcam = new tmImage.Webcam(400, 400, true);
                    await webcam.setup();
                    await webcam.play();
                    document.getElementById("display-container").appendChild(webcam.canvas);
                    window.requestAnimationFrame(loop);
                    activeView.classList.remove('hidden');
                    setupSection.classList.add('hidden'); // Fully hide setup when live
                } else {
                    isWebcamMode = false;
                    uploadSection.classList.remove('hidden');
                    setupSection.classList.add('hidden');
                }

                loadingDiv.classList.add('hidden');

            } catch (e) {
                console.error(e);
                loadingDiv.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = '<p class="text-red-500">Failed to initialize camera or model. Please check permissions.</p>';
                setupSection.classList.remove('opacity-40', 'pointer-events-none');
            }
        }

        async function loop() {
            if (!isWebcamMode) return;
            webcam.update();
            await predict(webcam.canvas);
            window.requestAnimationFrame(loop);
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(f) {
                const img = document.createElement('img');
                img.src = f.target.result;
                img.onload = async () => {
                    const display = document.getElementById("display-container");
                    display.innerHTML = '';
                    display.appendChild(img);
                    document.getElementById("upload-input-container").classList.add('hidden');
                    document.getElementById("active-view").classList.remove('hidden');
                    await predict(img);
                };
            };
            reader.readAsDataURL(file);
        }

        async function predict(imageElement) {
            const prediction = await model.predict(imageElement);
            for (let i = 0; i < maxPredictions; i++) {
                const classLabel = prediction[i].className;
                const probability = prediction[i].probability;
                const row = labelContainer.childNodes[i];
                
                row.querySelector('.class-name').innerText = classLabel;
                row.querySelector('.class-prob').innerText = probability.toFixed(2);
                row.querySelector('.progress-bar').style.width = (probability * 100).toFixed(0) + "%";
                
                // Color coding based on confidence
                const bar = row.querySelector('.progress-bar');
                if (probability > 0.8) {
                    bar.className = "progress-bar bg-green-500 h-3 rounded-full";
                } else if (probability > 0.4) {
                    bar.className = "progress-bar bg-indigo-500 h-3 rounded-full";
                } else {
                    bar.className = "progress-bar bg-slate-300 h-3 rounded-full";
                }
            }
        }
    </script>
</body>
</html>
