<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralith | Intelligent Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #09090b;
            --sidebar: #121215;
            --accent: #8e5cf5;
            --accent-soft: rgba(142, 92, 245, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #fafafa;
            overflow: hidden;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        /* Smooth Sidebar and Canvas Transitions */
        #canvas-panel {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 0;
            opacity: 0;
            pointer-events: none;
        }
        #canvas-panel.active {
            width: 50%;
            opacity: 1;
            pointer-events: auto;
        }

        /* Message Bubble Styles */
        .message-bubble {
            max-width: 85%;
            border-radius: 1.25rem;
            padding: 1rem;
            font-size: 0.9375rem;
            line-height: 1.6;
        }
        .user-bubble {
            background-color: #1e1e24;
            border: 1px solid #27272a;
            color: #fff;
        }
        .assistant-bubble {
            color: #d4d4d8;
        }

        /* Waiting Animation */
        .waiting-blob {
            width: 6px;
            height: 6px;
            background: #8e5cf5;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .blob-1 { animation-delay: -0.32s; }
        .blob-2 { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .bar { width: 2px; height: 100%; background: #ef4444; border-radius: 2px; animation: bounce-bar 0.6s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        @keyframes bounce-bar { 0%, 100% { height: 4px; } 50% { height: 12px; } }
    </style>
</head>
<body class="h-screen flex">

    <!-- Left Sidebar: Project History -->
    <aside class="w-64 bg-[#121215] border-r border-zinc-800 flex flex-col hidden md:flex">
        <div class="p-5 flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-sparkles text-white text-sm"></i>
            </div>
            <span class="font-bold text-zinc-100 tracking-tight">Auralith</span>
        </div>
        
        <div class="px-4 mb-4">
            <button onclick="createNewChat()" class="w-full py-2.5 bg-zinc-800/50 hover:bg-zinc-800 border border-zinc-700/50 rounded-xl text-xs font-semibold text-zinc-300 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
        </div>

        <div class="flex-grow overflow-y-auto px-2 space-y-1 chat-container" id="history-list"></div>

        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-500 font-medium">
            LONG-CAT FLASH OMNI PROXY
        </div>
    </aside>

    <!-- Main Workspace -->
    <div class="flex-grow flex flex-row overflow-hidden relative">
        
        <!-- Chat Side -->
        <main class="flex-grow flex flex-col relative bg-[#09090b] min-w-0">
            <header class="h-14 border-b border-zinc-900 flex items-center justify-between px-6 bg-[#09090b]/50 backdrop-blur-xl z-20">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-zinc-400">Current Session</span>
                </div>
                <div class="flex items-center gap-2">
                    <div id="voice-indicator" class="hidden flex items-center gap-2 px-2 py-1 bg-red-500/10 rounded-lg border border-red-500/20 mr-2">
                        <div class="flex h-3 items-center gap-0.5">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        </div>
                        <span class="text-[9px] font-bold text-red-500">VOICE ACTIVE</span>
                    </div>
                    <button id="voice-toggle-btn" onclick="toggleVoiceMode()" class="w-8 h-8 rounded-lg flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                </div>
            </header>

            <div id="chat-scroller" class="flex-grow overflow-y-auto p-4 md:p-8 space-y-8 chat-container pb-32">
                <div id="welcome-hero" class="max-w-xl mx-auto py-20 text-center">
                    <i class="fa-solid fa-hurricane text-4xl text-indigo-500 mb-6 block"></i>
                    <h2 class="text-3xl font-bold mb-2">How can I help?</h2>
                    <p class="text-zinc-500 text-sm">LongCat proxy backend is active and ready.</p>
                </div>
                <div id="messages-mount" class="max-w-2xl mx-auto"></div>
            </div>

            <!-- Input bar -->
            <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-[#09090b] via-[#09090b] to-transparent">
                <div class="max-w-2xl mx-auto relative">
                    <div id="loading-ui" class="hidden absolute -top-10 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-zinc-800 px-3 py-1.5 rounded-full border border-zinc-700 shadow-xl">
                        <div class="waiting-blob blob-1"></div>
                        <div class="waiting-blob blob-2"></div>
                        <div class="waiting-blob"></div>
                    </div>
                    <div class="bg-[#18181b] border border-zinc-800 rounded-2xl p-2 flex items-end shadow-2xl">
                        <textarea id="main-input" rows="1" placeholder="Type a message..." 
                            class="flex-grow bg-transparent border-none outline-none resize-none py-3 px-4 text-sm text-white placeholder-zinc-500"
                            oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                        <button onclick="handleSend()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl hover:bg-indigo-500 transition flex items-center justify-center shadow-lg shadow-indigo-500/20">
                            <i class="fa-solid fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Gemini-style Canvas Side -->
        <section id="canvas-panel" class="h-screen bg-[#121215] border-l border-zinc-800 flex flex-col z-30 overflow-hidden">
            <header class="h-14 flex items-center justify-between px-5 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-code text-indigo-400 text-sm"></i>
                    <span class="text-xs font-bold text-zinc-300">Canvas Artifact</span>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="copyCode()" class="w-8 h-8 rounded-lg text-zinc-500 hover:text-white transition"><i class="fa-solid fa-copy"></i></button>
                    <button onclick="closeCanvas()" class="w-8 h-8 rounded-lg text-zinc-500 hover:text-red-400 transition ml-2"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </header>
            <div class="flex-grow flex flex-col p-4">
                <div class="flex p-1 bg-zinc-900 rounded-lg mb-4 border border-zinc-800">
                    <button id="btn-prev" onclick="setCanvasMode('preview')" class="flex-grow py-1.5 text-[10px] font-bold rounded-md bg-zinc-800 text-white transition">PREVIEW</button>
                    <button id="btn-code" onclick="setCanvasMode('code')" class="flex-grow py-1.5 text-[10px] font-bold rounded-md text-zinc-500 transition">CODE</button>
                </div>
                <div id="canvas-preview" class="flex-grow bg-white rounded-xl overflow-hidden relative shadow-inner">
                    <iframe id="preview-frame" class="w-full h-full border-none"></iframe>
                </div>
                <div id="canvas-code" class="hidden flex-grow bg-zinc-950 rounded-xl overflow-hidden border border-zinc-800">
                    <pre class="p-4 text-[12px] font-mono text-zinc-400 h-full overflow-auto scrollbar-hide"><code id="code-mount"></code></pre>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "/api/chat";
        let sessions = JSON.parse(localStorage.getItem('auralith_vault')) || [];
        let activeSessionId = null;
        let currentMessages = [];
        let currentCanvasHTML = "";
        let voiceEnabled = false;

        const recognition = ('webkitSpeechRecognition' in window) ? new webkitSpeechRecognition() : null;
        if(recognition) {
            recognition.continuous = false;
            recognition.onresult = (e) => {
                document.getElementById('main-input').value = e.results[0][0].transcript;
                handleSend();
            };
            recognition.onend = () => { if(voiceEnabled) recognition.start(); };
        }

        function toggleVoiceMode() {
            voiceEnabled = !voiceEnabled;
            const btn = document.getElementById('voice-toggle-btn');
            const ind = document.getElementById('voice-indicator');
            
            if(voiceEnabled) {
                btn.className = "w-8 h-8 rounded-lg flex items-center justify-center bg-red-500 text-white transition";
                ind.classList.remove('hidden');
                recognition?.start();
            } else {
                btn.className = "w-8 h-8 rounded-lg flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition";
                ind.classList.add('hidden');
                recognition?.stop();
                window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            if(!voiceEnabled || !window.speechSynthesis) return;
            const clean = text.replace(/```[\s\S]*?```/g, "").substring(0, 300);
            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.rate = 1.1;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        async function handleSend() {
            const input = document.getElementById('main-input');
            const prompt = input.value.trim();
            if(!prompt) return;

            if(!activeSessionId) startNewSession(prompt);
            document.getElementById('welcome-hero').classList.add('hidden');

            appendMsg('user', prompt);
            input.value = '';
            input.style.height = 'auto';

            const loader = document.getElementById('loading-ui');
            loader.classList.remove('hidden');
            
            const aiMount = appendMsg('assistant', '...');
            currentMessages.push({ role: "user", content: prompt });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: currentMessages,
                        stream: false
                    })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                
                const reply = data.choices?.[0]?.message?.content || "Proxy Error";
                aiMount.innerText = reply;
                currentMessages.push({ role: "assistant", content: reply });
                
                saveToLocalStorage();
                detectAndOpenCanvas(reply);
                speakText(reply);
            } catch(e) {
                loader.classList.add('hidden');
                aiMount.innerHTML = `<span class="text-red-400">Connection failed: ${e.message}</span>`;
            }
        }

        function appendMsg(role, text) {
            const mount = document.getElementById('messages-mount');
            const wrapper = document.createElement('div');
            wrapper.className = `flex mb-6 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${role === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
            bubble.innerText = text;
            
            wrapper.appendChild(bubble);
            mount.appendChild(wrapper);
            wrapper.scrollIntoView({ behavior: 'smooth' });
            return bubble;
        }

        function detectAndOpenCanvas(text) {
            const match = text.match(/```html\n([\s\S]*?)```/);
            if(match) {
                currentCanvasHTML = match[1];
                document.getElementById('code-mount').innerText = currentCanvasHTML;
                const blob = new Blob([currentCanvasHTML], { type: 'text/html' });
                document.getElementById('preview-frame').src = URL.createObjectURL(blob);
                document.getElementById('canvas-panel').classList.add('active');
            }
        }

        function setCanvasMode(mode) {
            const isPrev = mode === 'preview';
            document.getElementById('canvas-preview').classList.toggle('hidden', !isPrev);
            document.getElementById('canvas-code').classList.toggle('hidden', isPrev);
            document.getElementById('btn-prev').className = isPrev ? 'flex-grow py-1.5 text-[10px] font-bold rounded-md bg-zinc-800 text-white transition' : 'flex-grow py-1.5 text-[10px] font-bold rounded-md text-zinc-500 transition';
            document.getElementById('btn-code').className = !isPrev ? 'flex-grow py-1.5 text-[10px] font-bold rounded-md bg-zinc-800 text-white transition' : 'flex-grow py-1.5 text-[10px] font-bold rounded-md text-zinc-500 transition';
        }

        function closeCanvas() { document.getElementById('canvas-panel').classList.remove('active'); }

        function copyCode() {
            navigator.clipboard.writeText(currentCanvasHTML);
            alert("Copied to clipboard");
        }

        function startNewSession(title) {
            activeSessionId = Date.now().toString();
            sessions.unshift({ id: activeSessionId, title: title.slice(0, 30), messages: [] });
            renderHistory();
        }

        function saveToLocalStorage() {
            const sess = sessions.find(s => s.id === activeSessionId);
            if(sess) sess.messages = currentMessages;
            localStorage.setItem('auralith_vault', JSON.stringify(sessions));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const item = document.createElement('button');
                item.className = `w-full text-left px-3 py-2 rounded-lg text-xs truncate transition ${s.id === activeSessionId ? 'bg-zinc-800 text-white' : 'text-zinc-500 hover:bg-zinc-800/30'}`;
                item.innerText = s.title;
                item.onclick = () => loadSession(s.id);
                list.appendChild(item);
            });
        }

        function loadSession(id) {
            const s = sessions.find(x => x.id === id);
            if(!s) return;
            activeSessionId = id;
            currentMessages = [...s.messages];
            document.getElementById('messages-mount').innerHTML = '';
            document.getElementById('welcome-hero').classList.add('hidden');
            currentMessages.forEach(m => {
                appendMsg(m.role, m.content);
                if(m.role === 'assistant') detectAndOpenCanvas(m.content);
            });
            renderHistory();
        }

        function createNewChat() {
            activeSessionId = null;
            currentMessages = [];
            document.getElementById('messages-mount').innerHTML = '';
            document.getElementById('welcome-hero').classList.remove('hidden');
            closeCanvas();
            renderHistory();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
