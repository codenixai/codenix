<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big Head Soccer Pro - XL Stadium Edition</title>
    <style>
        :root {
            --sky-blue: #1a2a6c;
            --grass-green: #2ecc71;
            --player-color: #e74c3c;
            --ai-color: #f1c40f;
            --ui-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            border: 6px solid #333;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            max-width: 95vw;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--ui-bg);
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; }

        .score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0;
            z-index: 10;
            pointer-events: none;
        }

        .team-box {
            padding: 10px 30px;
            min-width: 120px;
            text-align: center;
            border: 2px solid white;
        }

        .timer-box {
            background: #000;
            padding: 10px 25px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
            border: 2px solid white;
            min-width: 80px;
            text-align: center;
        }

        .power-meter-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 10px;
            background: #222;
            border-radius: 5px;
            border: 2px solid #fff;
            overflow: hidden;
        }

        #power-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0, #f00);
            box-shadow: 0 0 15px #ff0;
        }

        .start-prompt {
            animation: blink 1.5s infinite;
            color: #ffcc00;
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .controller-status {
            margin-top: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            font-size: 0.8rem;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">
            <div class="team-box" style="background: var(--player-color); border-radius: 10px 0 0 10px;">
                <div style="font-size: 0.8rem;">PLAYER 1</div>
                <div id="p-score" style="font-size: 2rem;">0</div>
            </div>
            <div class="timer-box" id="timer">60</div>
            <div class="team-box" style="background: var(--ai-color); color: black; border-radius: 0 10px 10px 0;">
                <div style="font-size: 0.8rem;">PRO CPU</div>
                <div id="c-score" style="font-size: 2rem;">0</div>
            </div>
        </div>

        <div class="power-meter-container">
            <div id="power-fill"></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Menu UI -->
        <div id="ui-overlay">
            <h1 style="font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 0;">PRO SOCCER XL</h1>
            <p class="start-prompt">ACTIVATE JOYSTICK OR PRESS BUTTON TO START</p>
            
            <div id="controller-info" class="controller-status">Detecting Controller...</div>

            <div style="margin-top: 30px; font-size: 0.85rem; opacity: 0.6; line-height: 1.6;">
                Left Stick / D-Pad: Move & Jump<br>
                Action Buttons: Jump / Tackle / Power Shot
            </div>
        </div>
    </div>

    <script>
        /**
         * AUDIO ENGINE
         */
        const AudioEngine = {
            ctx: null,
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                switch(type) {
                    case 'kick':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                        gain.gain.setValueAtTime(0.5, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.1);
                        osc.start(); osc.stop(now + 0.1);
                        break;
                    case 'jump':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.1);
                        osc.start(); osc.stop(now + 0.1);
                        break;
                    case 'tackle':
                        const noise = this.ctx.createBufferSource();
                        const bufferSize = this.ctx.sampleRate * 0.1;
                        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                        noise.buffer = buffer;
                        const noiseGain = this.ctx.createGain();
                        noise.connect(noiseGain);
                        noiseGain.connect(this.ctx.destination);
                        noiseGain.gain.setValueAtTime(0.3, now);
                        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        noise.start(); noise.stop(now + 0.1);
                        break;
                    case 'goal':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.exponentialRampToValueAtTime(880, now + 0.5);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(); osc.stop(now + 0.5);
                        break;
                }
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('ui-overlay');
        const powerFill = document.getElementById('power-fill');
        const controllerInfo = document.getElementById('controller-info');

        const W = 1200; 
        const H = 600;
        const GROUND_Y = H - 80;
        const GRAVITY = 0.6;
        const BOUNCE = 0.75;
        const P_SPEED = 7;
        const JUMP_FORCE = -15;

        canvas.width = W;
        canvas.height = H;

        let gameState = 'MENU';
        let timeLeft = 60;
        let scores = { p: 0, c: 0 };
        let powerValue = 0;
        let keys = {};
        let frame = 0;
        let particles = [];

        // Gamepad State
        let gamepadIndex = null;
        const DEADZONE = 0.5; // Ignore stick tilt less than 50%

        const ball = {
            x: W/2, y: H/2, r: 16,
            vx: 0, vy: 0, rot: 0,
            flame: false,
            trail: [],
            reset() {
                this.x = W/2; this.y = H/3;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = 0;
                this.flame = false;
                this.trail = [];
            }
        };

        const createPlayer = (x, color, name, isPlayer) => ({
            x, y: GROUND_Y,
            vx: 0, vy: 0,
            jumpCount: 0,
            color, name,
            isPlayer,
            r: 38,
            tilt: 0,
            blink: 0,
            tackling: 0,
            tackleCooldown: 0
        });

        const p = createPlayer(200, '#e74c3c', 'PLAYER', true);
        const c = createPlayer(W - 200, '#f1c40f', 'PRO CPU', false);

        function init() {
            window.addEventListener("gamepadconnected", (e) => {
                gamepadIndex = e.gamepad.index;
                controllerInfo.textContent = `CONTROLLER READY: ${e.gamepad.id}`;
                controllerInfo.style.color = "#2ecc71";
            });

            window.addEventListener("gamepaddisconnected", () => {
                gamepadIndex = null;
                controllerInfo.textContent = "Detecting Controller...";
                controllerInfo.style.color = "white";
            });

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (gameState !== 'PLAY') startMatch();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            setInterval(() => {
                if (gameState === 'PLAY') {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                    if (timeLeft <= 0) finish();
                }
            }, 1000);

            requestAnimationFrame(tick);
        }

        function pollGamepad() {
            if (gamepadIndex === null) return;
            const gp = navigator.getGamepads()[gamepadIndex];
            if (!gp) return;

            let isActivelyInputting = false;

            // D-Pad and Stick Mapping
            const axisX = gp.axes[0];
            const axisY = gp.axes[1];

            // Reset keys derived from gamepad to prevent sticky movement
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            keys['ArrowUp'] = false;

            // Check Stick Deadzones
            if (axisX < -DEADZONE) { keys['ArrowLeft'] = true; isActivelyInputting = true; }
            if (axisX > DEADZONE) { keys['ArrowRight'] = true; isActivelyInputting = true; }
            if (axisY < -DEADZONE) { keys['ArrowUp'] = true; isActivelyInputting = true; }

            // Check Buttons
            for (let i = 0; i < gp.buttons.length; i++) {
                if (gp.buttons[i].pressed) {
                    isActivelyInputting = true;
                    // Map specific buttons
                    if (i === 0 || i === 12) keys['ArrowUp'] = true; // Button A or D-Pad Up
                    if (i === 1) keys['ShiftLeft'] = true;           // Button B
                    if (i === 2) keys['Space'] = true;               // Button X
                    if (i === 14) keys['ArrowLeft'] = true;          // D-Pad Left
                    if (i === 15) keys['ArrowRight'] = true;         // D-Pad Right
                } else {
                    // Reset button states
                    if (i === 1) keys['ShiftLeft'] = (keys['ShiftLeft'] && i === 1) ? false : keys['ShiftLeft'];
                    if (i === 2) keys['Space'] = (keys['Space'] && i === 2) ? false : keys['Space'];
                }
            }

            // ONLY start if a button is pressed or stick is moved PAST the deadzone
            if (isActivelyInputting && gameState !== 'PLAY') {
                startMatch();
            }
        }

        function startMatch() {
            if (gameState === 'PLAY') return;
            AudioEngine.init();
            scores = { p: 0, c: 0 };
            timeLeft = 60;
            powerValue = 0;
            updateUI();
            resetPositions();
            gameState = 'PLAY';
            uiOverlay.classList.add('hidden');
        }

        function updateUI() {
            document.getElementById('p-score').textContent = scores.p;
            document.getElementById('c-score').textContent = scores.c;
            powerFill.style.width = powerValue + '%';
        }

        function resetPositions() {
            ball.reset();
            p.x = 250; p.y = GROUND_Y; p.vx = 0; p.vy = 0; p.tackling = 0;
            c.x = W - 250; c.y = GROUND_Y; c.vx = 0; c.vy = 0; c.tackling = 0;
        }

        function update() {
            pollGamepad();
            if (gameState !== 'PLAY') return;
            frame++;

            handleInput(p);
            handleAI(c);
            applyPhysics(p);
            applyPhysics(c);
            updateBall();
            checkBallCollision(p);
            checkBallCollision(c);
            checkTackleCollision();

            particles = particles.filter(pt => {
                pt.x += pt.vx; pt.y += pt.vy;
                pt.life -= 0.02;
                return pt.life > 0;
            });
        }

        function handleInput(obj) {
            if (keys['ArrowLeft'] || keys['KeyA']) {
                obj.vx = -P_SPEED;
                obj.tilt = -0.1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                obj.vx = P_SPEED;
                obj.tilt = 0.1;
            } else {
                obj.vx *= 0.8;
                obj.tilt *= 0.8;
            }

            if ((keys['ArrowUp'] || keys['KeyW']) && obj.jumpCount < 2) {
                if (!keys._lastJump) {
                    obj.vy = JUMP_FORCE;
                    obj.jumpCount++;
                    keys._lastJump = true;
                    AudioEngine.play('jump');
                }
            } else if (!keys['ArrowUp'] && !keys['KeyW']) {
                keys._lastJump = false;
            }

            if ((keys['ShiftLeft'] || keys['KeyK']) && obj.tackleCooldown <= 0) {
                obj.tackling = 15;
                obj.tackleCooldown = 40;
                obj.vx *= 2.5;
                AudioEngine.play('tackle');
            }
            if (obj.tackleCooldown > 0) obj.tackleCooldown--;
            if (obj.tackling > 0) obj.tackling--;

            if (powerValue < 100) powerValue += 0.03;
            updateUI();
        }

        function handleAI(obj) {
            const dist = ball.x - obj.x;
            if (Math.abs(ball.x - obj.x) > 40) {
                obj.vx = ball.x > obj.x ? P_SPEED * 0.85 : -P_SPEED * 0.85;
            }
            if (ball.y < obj.y - 100 && Math.abs(dist) < 100 && obj.jumpCount === 0) {
                obj.vy = JUMP_FORCE;
                obj.jumpCount = 1;
            }
            if (Math.abs(p.x - obj.x) < 120 && Math.abs(p.y - obj.y) < 50 && obj.tackleCooldown <= 0) {
                obj.tackling = 15;
                obj.tackleCooldown = 60;
                obj.vx *= 2;
                AudioEngine.play('tackle');
            }
            if (obj.tackleCooldown > 0) obj.tackleCooldown--;
            if (obj.tackling > 0) obj.tackling--;
        }

        function applyPhysics(obj) {
            obj.vy += GRAVITY;
            obj.x += obj.vx;
            obj.y += obj.vy;
            if (obj.y > GROUND_Y) {
                obj.y = GROUND_Y;
                obj.vy = 0;
                obj.jumpCount = 0;
            }
            obj.x = Math.max(40, Math.min(W - 40, obj.x));
            if (Math.random() < 0.01) obj.blink = 10;
            if (obj.blink > 0) obj.blink--;
        }

        function updateBall() {
            ball.vy += GRAVITY * 0.8;
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.rot += ball.vx * 0.05;
            if (ball.flame || Math.abs(ball.vx) > 10) {
                ball.trail.push({x: ball.x, y: ball.y});
                if (ball.trail.length > 10) ball.trail.shift();
            } else { ball.trail = []; }
            if (ball.y > GROUND_Y - ball.r) {
                ball.y = GROUND_Y - ball.r;
                ball.vy *= -BOUNCE;
                ball.vx *= 0.98;
            }
            if (ball.x < ball.r || ball.x > W - ball.r) {
                ball.vx *= -BOUNCE;
                ball.x = ball.x < ball.r ? ball.r : W - ball.r;
                AudioEngine.play('kick');
            }
            if (ball.y < ball.r) { ball.y = ball.r; ball.vy *= -BOUNCE; }
            const gH = 160; const gW = 80;
            if (ball.y > GROUND_Y - gH) {
                if (ball.x < gW) scorePoint('c');
                if (ball.x > W - gW) scorePoint('p');
            }
        }

        function scorePoint(who) {
            scores[who]++;
            AudioEngine.play('goal');
            updateUI();
            resetPositions();
            for(let i=0; i<30; i++) spawnParticle(ball.x, ball.y, '#fff');
        }

        function checkBallCollision(char) {
            const dx = ball.x - char.x;
            const dy = ball.y - (char.y - 60);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = ball.r + char.r;
            if (dist < minDist) {
                const ang = Math.atan2(dy, dx);
                const overlap = minDist - dist;
                ball.x += Math.cos(ang) * overlap;
                ball.y += Math.sin(ang) * overlap;
                let power = 13;
                if (char.isPlayer && keys['Space'] && powerValue >= 100) {
                    power = 25;
                    ball.flame = true;
                    powerValue = 0;
                }
                ball.vx = Math.cos(ang) * power + char.vx * 0.5;
                ball.vy = Math.sin(ang) * power + char.vy * 0.5;
                AudioEngine.play('kick');
                spawnParticle(ball.x, ball.y, char.color);
            }
        }

        function checkTackleCollision() {
            const dx = p.x - c.x;
            const dy = p.y - c.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 80) {
                if (p.tackling > 0 && c.tackling === 0) {
                    c.vx = (c.x - p.x) * 0.5;
                    c.vy = -8;
                    spawnParticle(c.x, c.y, '#fff');
                }
                if (c.tackling > 0 && p.tackling === 0) {
                    p.vx = (p.x - c.x) * 0.5;
                    p.vy = -8;
                    spawnParticle(p.x, p.y, '#fff');
                }
            }
        }

        function spawnParticle(x, y, color) {
            particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
        }

        function finish() {
            gameState = 'OVER';
            const win = scores.p > scores.c;
            document.querySelector('#ui-overlay h1').textContent = win ? "VICTORY!" : "DEFEAT";
            document.querySelector('.start-prompt').textContent = `FINAL SCORE: ${scores.p} - ${scores.c} • PRESS ANY BUTTON TO REPLAY`;
            uiOverlay.classList.remove('hidden');
        }

        function draw() {
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0, '#020111');
            grad.addColorStop(1, '#191970');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4;
            ctx.strokeRect(20, GROUND_Y, W - 40, H - GROUND_Y - 10);
            ctx.beginPath(); ctx.moveTo(W/2, GROUND_Y); ctx.lineTo(W/2, H); ctx.stroke();
            ctx.beginPath(); ctx.arc(W/2, GROUND_Y + 150, 100, Math.PI, 0); ctx.stroke();
            particles.forEach(pt => {
                ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            ball.trail.forEach((t, i) => {
                ctx.fillStyle = ball.flame ? '#f00' : 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * (i/10), 0, Math.PI*2); ctx.fill();
            });
            drawGoal(0, false);
            drawGoal(W - 80, true);
            drawPlayer(p); drawPlayer(c); drawBall();
        }

        function drawGoal(x, flip) {
            const h = 160; const w = 80;
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 6;
            ctx.strokeRect(x, GROUND_Y - h, w, h);
            ctx.lineWidth = 1; ctx.beginPath();
            for(let i=10; i<w; i+=10) { ctx.moveTo(x+i, GROUND_Y); ctx.lineTo(x+i, GROUND_Y-h); }
            for(let i=10; i<h; i+=10) { ctx.moveTo(x, GROUND_Y-i); ctx.lineTo(x+w, GROUND_Y-i); }
            ctx.stroke();
        }

        function drawBall() {
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rot);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0,0, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#000';
            for(let i=0; i<5; i++) { ctx.rotate(Math.PI*2/5); ctx.fillRect(ball.r-8, -2, 6, 4); }
            ctx.restore();
        }

        function drawPlayer(char) {
            ctx.save(); ctx.translate(char.x, char.y);
            if (char.tackling > 0) { ctx.shadowBlur = 20; ctx.shadowColor = '#fff'; ctx.translate(char.vx * 0.5, 0); }
            ctx.rotate(char.tilt);
            ctx.fillStyle = char.color; ctx.beginPath(); ctx.roundRect(-25, -50, 50, 45, 10); ctx.fill();
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -75, 40, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-15, -80, 10, 0, Math.PI*2); ctx.arc(15, -80, 10, 0, Math.PI*2); ctx.fill();
            if (char.blink === 0) {
                ctx.fillStyle = '#000';
                const lookX = (ball.x - char.x) * 0.02; const lookY = (ball.y - char.y) * 0.02;
                ctx.beginPath(); ctx.arc(-15 + lookX, -80 + lookY, 5, 0, Math.PI*2); ctx.arc(15 + lookX, -80 + lookY, 5, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#222'; ctx.fillRect(-30, -10, 20, 10); ctx.fillRect(10, -10, 20, 10);
            ctx.restore();
        }

        function tick() {
            update(); draw(); requestAnimationFrame(tick);
        }

        init();
    </script>
</body>
</html>
